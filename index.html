<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jahnavi weds Siva</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&family=Suravaram&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="text-[#E5E4E2]">

  <!-- Background Wedding Song -->
  <audio id="wedding-song" loop>
    <source src="song.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div id="custom-cursor"></div>

  <!-- Rest of your HTML remains exactly the same -->
  <section id="hero" class="relative z-50">
    <div id="lanterns" class="absolute inset-0 pointer-events-none"></div>
    <div id="names" class="px-4">
      <h1 class="text-6xl md:text-8xl script text-[#E5E4E2] drop-shadow-2xl">Jahnavi</h1>
      <p class="text-3xl md:text-5xl mt-2 tracking-widest text-[#E5E4E2] opacity-90 font-serif">WEDS</p>
      <h1 class="text-6xl md:text-8xl script text-[#E5E4E2] drop-shadow-2xl mt-2">Siva</h1>
    </div>
    <div id="temple-group">
      <img id="temple" src="assets/temple.png" alt="Temple" />
      <img id="thoranam-bottom" src="assets/thoranam.png" alt="Thoranam" class="w-full h-auto mt-0 relative z-10 brightness-110 drop-shadow-[0_0_20px_rgba(255,215,0,0.8)] opacity-0" style="transform: scale(1.25);" />
    </div>
  </section>

  <!-- Your CONTINUOUS-INVITATION-AREA, EVENTS, couple section, and countdown section remain unchanged -->
  <!-- (I have kept them the same as your original code to avoid mistakes) -->

  <div class="CONTINUOUS-INVITATION-AREA relative z-10" style="background-image: url(&quot;assets/56kvO.jpg&quot;); background-size: cover; background-repeat: repeat-y; background-position: center top;">
    <!-- ... your invitation content ... -->
  </div>

  <section id="couple" class="min-h-screen relative overflow-hidden" style="background: url(&quot;assets/56kvO.jpg&quot;); background-size: cover; background-position: center top;">
    <!-- ... couple section ... -->
  </section>

  <section class="min-h-screen bg-white text-gray-800 text-center py-20 px-6 relative flex flex-col items-center justify-center">
    <!-- ... countdown and contact section ... -->
  </section>

  <script src="script.js"></script>

  <script>
    const audio = document.getElementById('wedding-song');

    function startMusic() {
      audio.volume = 0.55;        // Comfortable volume
      audio.play().then(() => {
        console.log("Wedding song is now playing 🎵");
      }).catch(err => {
        console.log("Music play failed:", err);
      });
    }

    // Start music on first user interaction (tap or click anywhere)
    let musicStarted = false;

    document.addEventListener('click', () => {
      if (!musicStarted) {
        startMusic();
        musicStarted = true;
      }
    }, { once: true });

    // Also try on touch for mobile
    document.addEventListener('touchstart', () => {
      if (!musicStarted) {
        startMusic();
        musicStarted = true;
      }
    }, { once: true });

    // Optional: Pause when tab is not visible, resume when back
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        audio.pause();
      } else if (musicStarted && !audio.paused) {
        audio.play();
      }
    });
  </script>
</body>
</html>
